name: Build And Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build linux binary
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o dist/wack-backend .

      - name: Package deployment bundle
        run: |
          mkdir -p dist/bundle
          cp dist/wack-backend dist/bundle/
          cp scripts/deploy-backend.sh dist/bundle/
          cp ops/systemd/wack-backend.service dist/bundle/
          cp ops/env/wack-backend.env.example dist/bundle/
          tar -C dist/bundle -czf dist/wack-backend.tar.gz .

      - name: Upload bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: dist/wack-backend.tar.gz
          target: /tmp/wack-backend-deploy

      - name: Deploy backend on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_DEPLOY_PATH: ${{ secrets.BACKEND_DEPLOY_PATH }}
          BACKEND_SERVICE_NAME: ${{ secrets.BACKEND_SERVICE_NAME }}
          BACKEND_SERVICE_USER: ${{ secrets.BACKEND_SERVICE_USER }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          WACK_DB_PATH: ${{ secrets.WACK_DB_PATH }}
          WACK_DATA_DIR: ${{ secrets.WACK_DATA_DIR }}
          WACK_JWT_SECRET: ${{ secrets.WACK_JWT_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: BACKEND_DEPLOY_PATH,BACKEND_SERVICE_NAME,BACKEND_SERVICE_USER,BACKEND_PORT,WACK_DB_PATH,WACK_DATA_DIR,WACK_JWT_SECRET
          script: |
            set -eu
            mkdir -p /tmp/wack-backend-deploy/extracted
            tar -xzf /tmp/wack-backend-deploy/dist/wack-backend.tar.gz -C /tmp/wack-backend-deploy/extracted
            chmod +x /tmp/wack-backend-deploy/extracted/deploy-backend.sh
            /tmp/wack-backend-deploy/extracted/deploy-backend.sh \
              /tmp/wack-backend-deploy/extracted \
              "$BACKEND_DEPLOY_PATH" \
              "$BACKEND_SERVICE_NAME" \
              "$BACKEND_SERVICE_USER" \
              "$BACKEND_PORT" \
              "$WACK_DB_PATH" \
              "$WACK_DATA_DIR" \
              "$WACK_JWT_SECRET"
